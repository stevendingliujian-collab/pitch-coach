version: "3.9"

# ────────────────────────────────────────────────────────────────────────────
# OTD AI 述标教练 — 生产环境 Docker Compose
#
# 用法：
#   cp .env.example .env        # 填写所有环境变量
#   docker compose -f docker-compose.prod.yml up -d
#
# 访问地址：http://your-server-ip  (nginx 监听 80 端口)
# ────────────────────────────────────────────────────────────────────────────

x-api-env: &api-env
  DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
  REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
  MINIO_BUCKET: ${MINIO_BUCKET:-pitchcoach}
  MINIO_SECURE: "false"
  SECRET_KEY: ${SECRET_KEY}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
  # LLM / ASR / TTS
  DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
  DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
  FISH_AUDIO_API_KEY: ${FISH_AUDIO_API_KEY:-}
  IFLYTEK_APP_ID: ${IFLYTEK_APP_ID:-}
  IFLYTEK_API_KEY: ${IFLYTEK_API_KEY:-}
  IFLYTEK_API_SECRET: ${IFLYTEK_API_SECRET:-}
  # SMS / WeChat (optional)
  SMS_PROVIDER: ${SMS_PROVIDER:-stub}
  WECHAT_APP_ID: ${WECHAT_APP_ID:-}
  WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:-}

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.2
    restart: always
    volumes:
      - qdrant_data:/qdrant/storage

  # ── Backend ─────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      <<: *api-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      <<: *api-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=warning --concurrency=2

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      <<: *api-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app beat --loglevel=warning --scheduler celery.beat:PersistentScheduler

  # ── Frontend + nginx reverse proxy ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
  qdrant_data:
